<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPN Label & Worksheet System | SRT Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; color: #000; line-height: 1.05; }
    [contenteditable="true"]:hover { background: #fff9c4; outline: 1px dashed #000; cursor: text; }
    
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; margin: 0; padding: 0; }
      .print-area:not(.active) { display: none !important; }
      .sticker { 
        box-shadow: none !important; 
        border: 1.5px solid #000 !important; 
        margin: 0 auto !important; 
        page-break-after: avoid; 
        page-break-inside: avoid; 
        display: flex !important;
      }
    }

    /* 📌 เลื่อนลงมา 3.5 mm โดยการปรับ padding-top เป็น 1.45cm */
    .sticker-pn { 
      width: 8.5cm; 
      min-height: 12.8cm; 
      padding: 1.45cm 0.4cm 0.3cm 0.4cm; 
      background: white; 
      border: 1.5px solid #000; 
      margin: 10px auto; 
      display: flex; 
      flex-direction: column; 
    }

    .pn-table { width: 100%; font-size: 13.5px; border-collapse: collapse; border: 1.5px solid #000; }
    .pn-table td, .pn-table th { border: 1px solid #000; padding: 1.5px 5px; } 
    
    /* Fat & Bag Label: ขนาดดั้งเดิมเป๊ะๆ */
    .sticker-small { width: 3.5in; height: 2.48in; padding: 1.3cm 0.25in 0.1in 0.25in; background: white; border: 1px solid #000; margin: 10px auto; }
    .fat-table-bold { width: 100%; border-collapse: collapse; border: 2px solid #000; font-size: 14px; }
    .fat-table-bold td { border: 2px solid #000; padding: 5px; font-weight: 800; }
    
    /* Worksheet Size */
    .sheet { width: 14.85cm; height: 21cm; padding: 0.5cm 0.7cm 0.3cm 0.7cm; margin: 10px auto; background: white; border: 1.5px solid #000; display: flex; flex-direction: column; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <div class="max-w-5xl mx-auto py-6 px-4 no-print text-center">
    <div class="mb-6">
      <h1 class="text-2xl font-black text-slate-800 italic uppercase">TPN Printing Control</h1>
      <p class="text-slate-500">HN: <span id="display-info" class="font-bold text-blue-600">กำลังโหลด...</span></p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div id="card-pn" onclick="selectSection('pn')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-blue-400">
        <h3 class="font-black text-blue-600">1. PN LABEL</h3>
        <select id="pnCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full"><option value="1">1 ขวด</option><option value="2">2 ขวด</option></select>
      </div>
      <div id="card-fat" onclick="selectSection('fat')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-amber-400">
        <h3 class="font-black text-amber-600">2. FAT LABEL</h3>
        <select id="fatCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full"><option value="1">1 อัน</option><option value="2">2 อัน</option></select>
      </div>
      <div id="card-bag" onclick="selectSection('bag')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-emerald-400">
        <h3 class="font-black text-emerald-600">3. ฉลากหน้าถุง</h3>
      </div>
      <div id="card-ws" onclick="selectSection('ws')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-rose-400">
        <h3 class="font-black text-rose-600">4. WORKSHEET</h3>
        <select id="wsBagCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full"><option value="1">1 ถุง</option><option value="2">2 ถุง</option></select>
      </div>
    </div>
    <div id="action-btns" class="hidden">
      <button onclick="window.print()" class="bg-black text-white py-4 px-12 rounded-full font-black text-xl shadow-xl hover:scale-105 transition-all">🖨️ พิมพ์ที่เลือก</button>
    </div>
  </div>

  <div id="pn-area" class="print-area"></div>
  <div id="fat-area" class="print-area"></div>
  <div id="bag-area" class="print-area"></div>
  <div id="ws-area" class="print-area"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx4w9wF--TwiBVVLiAVXYbHZPeEw_iHasaHSMdgVMhdW4E2dsw3vvXJ09zjUdGXnrdj6w/exec';
    let rawData = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const hnValue = urlParams.get('row') || urlParams.get('hn'); 
      if (hnValue) {
        try {
          const res = await fetch(`${API_URL}?action=getLastOrder&hn=${encodeURIComponent(hnValue)}`);
          rawData = await res.json();
          if(rawData) {
            document.getElementById('display-info').innerText = `${rawData.hn} - ${rawData.patient_name}`;
            renderAll();
          }
        } catch (e) { document.getElementById('display-info').innerText = "เชื่อมต่อไม่ได้"; }
      }
    });

    function selectSection(type) {
      document.querySelectorAll('.print-area').forEach(el => el.classList.remove('active'));
      document.getElementById(`${type}-area`).classList.add('active');
      document.querySelectorAll('.rounded-2xl').forEach(el => el.classList.remove('card-active'));
      document.getElementById(`card-${type}`).classList.add('card-active');
      document.getElementById('action-btns').classList.remove('hidden');
    }

    const smartFix = (v, div = 1) => {
      let val = (parseFloat(v) || 0) / div;
      return val === 0 ? "-" : Number(val.toFixed(2));
    };

    function formatThaiDate(dateStr) {
      if (!dateStr) return "-";
      const d = new Date(dateStr);
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
    }

    function renderAll() {
      if (!rawData) return;
      const o = rawData;
      const pnDiv = parseInt(document.getElementById('pnCount').value);
      const pnArea = document.getElementById('pn-area'); pnArea.innerHTML = '';
      for (let i = 1; i <= pnDiv; i++) { pnArea.innerHTML += createPN(o, i, pnDiv); }
      const fatDiv = parseInt(document.getElementById('fatCount').value);
      const fatArea = document.getElementById('fat-area'); fatArea.innerHTML = '';
      for (let j = 1; j <= fatDiv; j++) { fatArea.innerHTML += createFat(o, j, fatDiv); }
      document.getElementById('bag-area').innerHTML = createBag(o);
      document.getElementById('ws-area').innerHTML = createWS(o, parseInt(document.getElementById('wsBagCount').value));
    }

    function createPN(o, bNum, div) {
      const expDate = new Date(); expDate.setDate(expDate.getDate() + 1);
      
      const routeDisplay = o.route === 'central' ? 'C-line' : 'P-line';
      const proteinDisplay = o.protein_product === 'aminoven' ? '10% Aminoven-Infant' : (o.protein_product === 'amiparen' ? '10% Amiparen' : '15% Aminoplasmal');
      const traceDisplay = o.trace_choice === 'Addamel' ? 'Addamel-N' : 'Peditrace';
      const vitDisplay = o.vit_choice === 'Soluvit' ? 'Soluvit-N' : 'Cernevit';
      const phosDisplay = o.phos_source === 'Glycophos' ? 'Glycophos (P)' : 'K2HPO4 (P)';
      const naDisplay = o.na_source === 'NaCl' ? '3% NaCl (Na)' : 'Na Acetate (Na)';
      const kDisplay = o.k_source === 'KCl' ? '15% KCl (K)' : 'K Acetate (K)';

      // 📌 ดึงค่า Sterile Water จาก Google Sheet ตรงๆ
      const waterVal = o.water_vol !== undefined ? o.water_vol : 0;

      const pnCalDaily = (parseFloat(o.total_calories)||0) - ((parseFloat(o.fat_vol)||0) * 2);
      const girResult = ((parseFloat(o.dex_percent)||0) * (parseFloat(o.rate_pn)||0)) / ((parseFloat(o.bw)||1) * 6);

      return `<div class="sticker sticker-pn" contenteditable="true">
        <div class="flex justify-between font-bold border-b-2 border-black mb-1 text-[13px]">
          <span>HN: ${o.hn} - ${o.patient_name}</span>
          <span>ขวด: ${bNum}/${div}</span>
        </div>
        <div class="flex justify-between font-bold border-b border-black mb-1 text-[12px]">
          <span>Ward: ${o.ward}</span>
          <span>Route: ${routeDisplay}</span>
        </div>
        <table class="pn-table">
          <thead><tr class="bg-gray-100"><th class="w-8"></th><th>รายการ</th><th>ปริมาตร (ml)</th></tr></thead>
          <tbody>
            <tr><td class="text-center">1</td><td>Sterile Water</td><td class="text-right font-bold">${smartFix(waterVal, div)}</td></tr>
            <tr><td class="text-center">2</td><td>50% D-W</td><td class="text-right font-bold">${smartFix(o.dex_50_vol, div)}</td></tr>
            <tr><td class="text-center">3</td><td>${proteinDisplay}</td><td class="text-right font-bold">${smartFix(o.protein_vol, div)}</td></tr>
            <tr><td class="text-center">4</td><td>${phosDisplay}</td><td class="text-right font-bold">${smartFix(o.phos_vol, div)}</td></tr>
            <tr><td class="text-center">5</td><td>${naDisplay}</td><td class="text-right font-bold">${smartFix(o.na_vol, div)}</td></tr>
            <tr><td class="text-center">6</td><td>${kDisplay}</td><td class="text-right font-bold">${smartFix(o.k_vol, div)}</td></tr>
            <tr><td class="text-center">7</td><td>50% MgSO4 (Mg)</td><td class="text-right font-bold">${smartFix(o.mg_vol, div)}</td></tr>
            <tr><td class="text-center">8</td><td>10% Ca Gluconate</td><td class="text-right font-bold">${smartFix(o.ca_vol, div)}</td></tr>
            <tr><td class="text-center">9</td><td>${traceDisplay}</td><td class="text-right font-bold">${smartFix(o.trace_vol, div)}</td></tr>
            <tr><td class="text-center">10</td><td>Zinc sulfate</td><td class="text-right font-bold">${smartFix(o.zinc_vol, div)}</td></tr>
            <tr><td class="text-center">11</td><td>${vitDisplay}</td><td class="text-right font-bold">${smartFix(o.vit_vol, div)}</td></tr>
            <tr><td class="text-center">12</td><td>${o.add_name || 'อื่นๆ'}</td><td class="text-right font-bold">${smartFix(o.add_vol, div)}</td></tr>
            <tr><td class="text-center">13</td><td>Heparin (1u/ml)</td><td class="text-right font-bold">${smartFix(o.heparin_vol, div)}</td></tr>
            <tr class="font-bold border-t-2 border-black bg-gray-50 text-[14px]">
              <td colspan="2" class="text-right text-xs uppercase tracking-tighter">Total PN vol:</td>
              <td class="text-right underline">${smartFix(o.pn_volume_net, div)} ml</td>
            </tr>
            <tr class="font-bold bg-gray-50 text-[14px]">
              <td colspan="2" class="text-right text-[11px]">Total + ไล่สาย ${smartFix(o.pn_flush_vol, div)}ml:</td>
              <td class="text-right underline">${smartFix(o.pn_prep_vol, div)} ml</td>
            </tr>
          </tbody>
        </table>
        
        <div class="flex justify-between items-end mt-auto pt-1 border-t-2 border-black">
          <div class="text-[10px] leading-tight font-bold">
            <p>Total cal (รวม fat): ${parseFloat(o.total_calories).toFixed(1)} kcal/d</p>
            <p>PN cal: ${pnCalDaily.toFixed(1)} kcal/d</p>
            <p>% Glucose: ${o.dex_percent}% &nbsp; GIR: ${girResult.toFixed(2)}</p>
            <p>Osmol: ${o.final_osmolarity} mOsmol/L</p>
          </div>
          <div class="text-right flex flex-col items-center">
            <div class="border-2 border-black px-1.5 py-0.5 font-black text-sm whitespace-nowrap">Rate: ${o.rate_pn} ml/hr</div>
            <div class="text-[9px] mt-0.5 font-bold text-center">หมดอายุ: ${formatThaiDate(expDate)}<br>เวลา 18.00 น.</div>
          </div>
        </div>
      </div>`;
    }

    function createFat(o, fNum, div) {
      const productLabel = o.fat_product === 'smof' ? '20% SMOF Lipid' : '20% Intralipid';
      const vitLabel = o.vitalipid_type === 'Adult' ? 'Vitalipid-N Adult' : 'Vitalipid-N Infant';
      return `<div class="sticker sticker-small" contenteditable="true">
        <div class="font-bold text-xs">${o.hn} - ${o.patient_name}</div>
        <div class="flex justify-between text-lg font-black border-b-2 border-black"><span>Ward: ${o.ward}</span><span>${fNum}/${div}</span></div>
        <table class="fat-table-bold mt-1">
          <tr><td>${productLabel} + Flush</td><td class="text-right">${smartFix(parseFloat(o.fat_vol)+parseFloat(o.fat_flush_vol), div)}</td></tr>
          <tr><td>${vitLabel}</td><td class="text-right">${smartFix(o.vitalipid_vol, div)}</td></tr>
          <tr class="bg-gray-100"><td>Total Volume</td><td class="text-right">${smartFix(o.total_fat_prep, div)}</td></tr>
        </table>
        <div class="font-bold text-sm">Rate: ${o.fat_drip_rate} ml/hr</div>
      </div>`;
    }

    function createBag(o) {
      return `<div class="sticker sticker-small flex flex-col items-center justify-center text-center" contenteditable="true">
        <div class="text-5xl font-black">${o.ward}</div>
        <div class="border-y-4 border-black w-full my-4 text-2xl font-black uppercase tracking-tight">${o.patient_name}</div>
        <div class="font-bold text-lg">HN: ${o.hn}</div>
        <div class="font-bold">วันที่: ${formatThaiDate(o.order_date)}</div>
      </div>`;
    }

    function createWS(o, div) {
      let cur = 0;
      const proteinDisplay = o.protein_product === 'aminoven' ? '10% Aminoven-Infant' : (o.protein_product === 'amiparen' ? '10% Amiparen' : '15% Aminoplasmal');
      const traceDisplay = o.trace_choice === 'Addamel' ? 'Addamel-N' : 'Peditrace';
      const vitDisplay = o.vit_choice === 'Soluvit' ? 'Soluvit-N' : 'Cernevit';
      const waterVal = o.water_vol !== undefined ? o.water_vol : 0;

      const items = [
        { n: "Sterile Water", v: waterVal, s: true },
        { n: "50% D-W", v: o.prep_dex_vol, s: true },
        { n: proteinDisplay, v: o.protein_vol, s: true },
        { n: o.phos_source === 'Glycophos' ? 'Glycophos (P)' : 'K2HPO4 (P)', v: o.phos_vol, s: false },
        { n: o.na_source === 'NaCl' ? '3% NaCl (Na)' : 'Na Acetate (Na)', v: o.na_vol, s: true },
        { n: o.k_source === 'KCl' ? '15% KCl (K)' : 'K Acetate (K)', v: o.k_vol, s: false },
        { n: "50% MgSO4 (Mg)", v: o.mg_vol, s: false },
        { n: traceDisplay, v: o.trace_vol, s: false },
        { n: "10% Ca Gluconate", v: o.ca_vol, s: false },
        { n: "Zinc Sulfate", v: o.zinc_vol, s: false },
        { n: vitDisplay, v: o.vit_vol, s: false },
        { n: o.add_name || "อื่นๆ", v: o.add_vol, s: false },
        { n: "Heparin", v: o.heparin_vol, s: false }
      ];

      let rows = items.map((it, i) => {
        const val = parseFloat(it.v) || 0;
        if(it.s || i > 4) cur += (val/div);
        return `<tr><td class="text-center">${i+1}</td><td>${it.n}</td><td class="text-center font-bold text-blue-700">${smartFix(it.v, div)}</td><td class="text-right font-black">${it.s ? smartFix(cur) : ''}</td></tr>`;
      }).join('');

      return `<div class="sheet" contenteditable="true">
        <div class="flex justify-between items-center mb-4 border-b-4 border-black pb-2">
          <div><h1 class="text-3xl font-black italic">TPN WORKSHEET</h1><p class="text-xl font-bold">แบ่งเตรียม x${div} ถุง/ขวด</p></div>
          <div class="text-7xl font-black">${o.ward}</div>
        </div>
        <p class="text-2xl font-bold mb-4">${o.patient_name} (HN: ${o.hn})</p>
        <table class="ws-table text-[15px]">
          <thead><tr class="bg-gray-100"><th class="w-10"></th><th class="text-center">รายการสารอาหาร</th><th class="w-24">Prep (ml)</th><th class="w-24 text-red-600">สะสม (ml)</th></tr></thead>
          <tbody>${rows}</tbody>
          <tr class="bg-gray-200 font-black text-3xl"><td colspan="2" class="text-right">Total Prep:</td><td colspan="2" class="text-center underline">${smartFix(o.pn_prep_vol, div)} ml</td></tr>
        </table>
        <div class="mt-auto pt-4 border-t-2 border-black flex justify-between font-bold italic text-sm"><span>SRT Edition</span><span>วันที่สั่ง: ${formatThaiDate(o.order_date)}</span></div>
      </div>`;
    }
  </script>
</body>
</html>
