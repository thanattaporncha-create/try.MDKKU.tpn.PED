<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPN Label & Worksheet System | SRT Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; color: #000; line-height: 1.05; }
    [contenteditable="true"]:hover { background: #fff9c4; outline: 1px dashed #000; cursor: text; }

    @media print {
      .no-print { display: none !important; }
      body { background: #fff; margin: 0; padding: 0; }
      .print-area:not(.active) { display: none !important; }
      .sticker { box-shadow: none !important; border: none !important; margin: 0 auto !important; display: flex !important; }
      .sticker-pn { border: 1.5px solid #000 !important; }
      .sheet { box-shadow: none !important; border: 1.5px solid #000 !important; margin: 0 !important; }
    }

    /* ── PN Label ── */
    .sticker-pn { width: 8.5cm; min-height: 12.8cm; padding: 1.45cm 0.4cm 0.3cm 0.4cm; background: white; border: 1.5px solid #000; margin: 10px auto; display: flex; flex-direction: column; }
    .pn-table { width: 100%; font-size: 13.5px; border-collapse: collapse; border: 1.5px solid #000; }
    .pn-table td, .pn-table th { border: 1px solid #000; padding: 1.5px 5px; background: white !important; }

    /* ── Fat & Bag Label ── */
    .sticker-small { width: 3.5in; height: 2.48in; padding: 0.1in 0.25in 0.1in 0.25in; background: white; border: none; margin: 10px auto; box-sizing: border-box; position: relative; }

    /* ── Worksheet ── */
    .sheet { width: 14.85cm; height: 21cm; padding: 0.5cm 0.7cm 0.3cm 0.7cm; margin: 10px auto; background: white; border: 1.5px solid #000; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
    .sheet table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
    .sheet th, .sheet td { border: 1.5px solid #000; padding: 5px 10px; vertical-align: middle; }
    .sheet th { font-weight: 800; font-size: 16px; background: #fff; }
    .item-name { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
    .val-prep { font-weight: 800; font-size: 24px; }
    .val-cumul { font-weight: 900; font-size: 24px; text-align: right; background: white !important; }
    .bag-badge { border: 2.5px solid #000; padding: 2px 10px; font-size: 16px; font-weight: 900; display: inline-block; margin-bottom: 4px; }
    .footer-sign { height: 3.0cm; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 1cm 0.5cm 1cm; }

    /* ── Worksheet Colors ── */
    .c-amiparen      { color: #008000 !important; } 
    .c-aminoplasmal { color: #0077cc !important; } 
    .c-peditrace    { color: #ff8c00 !important; } 
    .c-cernevit     { color: #228b22 !important; } 
    .c-bcomplex     { color: #ff1493 !important; } 
    .bg-yellow-highlight { background-color: #ffff80 !important; } 
    .bg-pink-highlight   { background-color: #ffb6c1 !important; } 
    .bg-purple-highlight { background-color: #e6e6fa !important; } 
    .c-black         { color: #000000 !important; }
  </style>
</head>
<body class="bg-white min-h-screen pb-20">

  <nav class="no-print sticky top-0 z-50 bg-slate-800 text-white shadow-lg py-3 px-4 mb-6">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <button onclick="history.back()" class="flex items-center gap-2 px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded-xl transition-all font-bold text-sm border border-white/30 text-white">
        <span>⬅️</span> ย้อนกลับ
      </button>
      
      <div class="flex gap-2">
        <a href="index.html" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl transition-all font-bold text-sm text-white">
          <span>➕</span> คำนวณใหม่
        </a>
        <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl transition-all font-bold text-sm text-white">
          <span>📊</span> Dashboard
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto py-2 px-4 no-print text-center">
    <div class="mb-6">
      <h1 class="text-2xl font-black text-slate-800 italic uppercase">TPN Printing Control</h1>
      <p class="text-slate-500">HN: <span id="display-info" class="font-bold text-blue-600">กำลังโหลด...</span></p>
    </div>
   <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
  <div id="card-pn" onclick="selectSection('pn')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-blue-400">
    <h3 class="font-black text-blue-600">1. PN LABEL</h3>
    <select id="pnCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full">
      <option value="1">1 ขวด</option>
      <option value="2">2 ขวด</option>
      <option value="3">3 ขวด</option>
      <option value="4">4 ขวด</option>
    </select>
  </div>

  <div id="card-fat" onclick="selectSection('fat')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-amber-400">
    <h3 class="font-black text-amber-600">2. FAT LABEL</h3>
    <select id="fatCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full">
      <option value="1">1 อัน</option>
      <option value="2">2 อัน</option>
      <option value="3">3 อัน</option>
      <option value="4">4 อัน</option>
    </select>
  </div>

  <div id="card-bag" onclick="selectSection('bag')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-emerald-400">
    <h3 class="font-black text-emerald-600">3. ฉลากหน้าถุง</h3>
  </div>

  <div id="card-ws" onclick="selectSection('ws')" class="bg-white p-4 rounded-2xl border-4 border-slate-100 cursor-pointer transition-all hover:border-rose-400">
    <h3 class="font-black text-rose-600">4. WORKSHEET</h3>
    <select id="wsBagCount" onchange="renderAll()" class="mt-2 p-1 border rounded w-full">
      <option value="1">1 ถุง</option>
      <option value="2">2 ถุง</option>
      <option value="3">3 ถุง</option>
      <option value="4">4 ถุง</option>
    </select>
  </div>
</div>
  <div id="pn-area"  class="print-area"></div>
  <div id="fat-area" class="print-area"></div>
  <div id="bag-area" class="print-area"></div>
  <div id="ws-area"  class="print-area"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyXyxY5-CnIGGuIMLVlIIlNHfVsqoeqRDjiz1_Qgr_qKXPHwh73lx9mhGjTES9bXqcqbA/exec';
  let rawData = null;

  document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const hnValue = urlParams.get('row') || urlParams.get('hn');
    if (hnValue) {
      try {
        const res = await fetch(`${API_URL}?action=getLastOrder&hn=${encodeURIComponent(hnValue)}`);
        rawData = await res.json();
        if (rawData) {
          document.getElementById('display-info').innerText = `${rawData.hn} - ${rawData.patient_name}`;
          renderAll();
        }
      } catch (e) { document.getElementById('display-info').innerText = "เชื่อมต่อไม่ได้"; }
    }
  });

  function selectSection(type) {
    document.querySelectorAll('.print-area').forEach(el => el.classList.remove('active'));
    document.getElementById(`${type}-area`).classList.add('active');
    document.querySelectorAll('[id^="card-"]').forEach(el => el.style.borderColor = '');
    document.getElementById(`card-${type}`).style.borderColor = '#2563eb';
    document.getElementById('action-btns').classList.remove('hidden');
  }

  const smartFix = (v, div = 1) => {
    const val = (parseFloat(v) || 0) / div;
    return val === 0 ? "-" : Number(val.toFixed(2));
  };
  const getNum = (v, div = 1) => (parseFloat(v) || 0) / div;
  const wsShow = (n) => (n === 0 ? "-" : Number(n.toFixed(2)).toString());

  function formatThaiDate(dateStr) {
    if (!dateStr) return "-";
    const d = new Date(dateStr);
    const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
  }

  function renderAll() {
    if (!rawData) return;
    const o = rawData;
    const pnDiv = parseInt(document.getElementById('pnCount').value);
    const pnArea = document.getElementById('pn-area'); pnArea.innerHTML = '';
    for (let i = 1; i <= pnDiv; i++) pnArea.innerHTML += createPN(o, i, pnDiv);
    const fatDiv = parseInt(document.getElementById('fatCount').value);
    const fatArea = document.getElementById('fat-area'); fatArea.innerHTML = '';
    for (let j = 1; j <= fatDiv; j++) fatArea.innerHTML += createFat(o, j, fatDiv);
    document.getElementById('bag-area').innerHTML = createBag(o);
    const wsDiv = parseInt(document.getElementById('wsBagCount').value);
    document.getElementById('ws-area').innerHTML = createWS(o, wsDiv);
  }

  function createPN(o, bNum, div) {
    const expDate = new Date(); expDate.setDate(expDate.getDate() + 1);
    const routeDisplay = o.route === 'central' ? 'C-line' : (o.route === 'peripheral' ? 'P-line' : o.route);
    const proteinDisplay = o.protein_product === 'aminoven' ? '10% Aminoven-Infant' : o.protein_product === 'amiparen' ? '10% Amiparen' : '15% Aminoplasmal';
    const phosDisplay = o.phos_source === 'Glycophos' ? 'Glycophos (P)' : 'K2HPO4 (P)';
    const naDisplay = o.na_source === 'NaCl' ? '3% NaCl (Na)' : o.na_source === 'NaAcetate' ? 'Na Acetate (Na)' : o.na_source;
    const kDisplay = o.k_source === 'KCl' ? '15% KCl (K)' : o.k_source === 'KAcetate' ? 'K Acetate (K)' : o.k_source;
    const traceDisplay = o.trace_choice === 'Addamel' ? 'Addamel-N' : 'Peditrace';
    const vitDisplay = o.vit_choice === 'Soluvit' ? 'Soluvit-N' : 'Cernevit';
    const girResult = ((parseFloat(o.dex_percent) || 0) * (parseFloat(o.rate_pn) || 0)) / ((parseFloat(o.bw) || 1) * 6);
    return `<div class="sticker sticker-pn" contenteditable="true">
      <div class="flex justify-between font-bold border-b-2 border-black mb-1 text-[13.5px]"><span>HN: ${o.hn} - ${o.patient_name}</span><span>ขวด: ${bNum}/${div}</span></div>
      <div class="flex justify-between font-bold border-b border-black mb-1 text-[12.5px]"><span>Ward: ${o.ward}</span><span>Route: ${routeDisplay}</span></div>
      <table class="pn-table">
        <thead><tr style="background: white !important;"><th class="w-8"></th><th class="text-center">รายการ</th><th class="text-center">ปริมาตร (ml)</th></tr></thead>
        <tbody>
          <tr><td class="text-center">1</td><td>Sterile Water</td><td class="text-right font-bold">${smartFix(o.water_vol, div)}</td></tr>
          <tr><td class="text-center">2</td><td>50% D-W</td><td class="text-right font-bold">${smartFix(o.dex_50_vol, div)}</td></tr>
          <tr><td class="text-center">3</td><td>${proteinDisplay}</td><td class="text-right font-bold">${smartFix(o.protein_vol, div)}</td></tr>
          <tr><td class="text-center">4</td><td>${phosDisplay}</td><td class="text-right font-bold">${smartFix(o.phos_vol, div)}</td></tr>
          <tr><td class="text-center">5</td><td>${naDisplay}</td><td class="text-right font-bold">${smartFix(o.na_vol, div)}</td></tr>
          <tr><td class="text-center">6</td><td>${kDisplay}</td><td class="text-right font-bold">${smartFix(o.k_vol, div)}</td></tr>
          <tr><td class="text-center">7</td><td>50% MgSO4 (Mg)</td><td class="text-right font-bold">${smartFix(o.mg_vol, div)}</td></tr>
          <tr><td class="text-center">8</td><td>10% Ca Gluconate</td><td class="text-right font-bold">${smartFix(o.ca_vol, div)}</td></tr>
          <tr><td class="text-center">9</td><td>${traceDisplay}</td><td class="text-right font-bold">${smartFix(o.trace_vol, div)}</td></tr>
          <tr><td class="text-center">10</td><td>Zinc sulfate</td><td class="text-right font-bold">${smartFix(o.zinc_vol, div)}</td></tr>
          <tr><td class="text-center">11</td><td>${vitDisplay}</td><td class="text-right font-bold">${smartFix(o.vit_vol, div)}</td></tr>
          <tr><td class="text-center">12</td><td>${o.add_name || 'อื่นๆ'}</td><td class="text-right font-bold">${smartFix(o.add_vol, div)}</td></tr>
          <tr><td class="text-center">13</td><td>Heparin (1u/ml)</td><td class="text-right font-bold">${smartFix(o.heparin_vol, div)}</td></tr>
          <tr class="font-bold border-t-2 border-black" style="background: white !important;"><td colspan="2" class="text-right">Total PN vol:</td><td class="text-right">${smartFix(o.pn_volume_net, div)} ml</td></tr>
          <tr class="font-bold" style="background: white !important;"><td colspan="2" class="text-right text-xs">Total + ไล่สาย ${smartFix(o.pn_flush_vol, div)} ml:</td><td class="text-right">${smartFix(o.pn_prep_vol, div)} ml</td></tr>
        </tbody>
      </table>
      <div class="flex justify-between items-end mt-0.5 pt-1 border-t-2 border-black">
        <div class="text-[10px] leading-tight font-bold">
          <p>Total cal (รวม fat) : ${parseFloat(o.total_calories).toFixed(1)} kcal/d</p>
          <p>% Glucose: ${o.dex_percent}% &nbsp; GIR: ${girResult.toFixed(2)}</p>
          <p>Osmolarity: ${o.final_osmolarity} mOsmol/L</p>
        </div>
        <div class="text-right flex flex-col items-end">
          <div class="border-2 border-black px-1.5 py-0.5 font-black text-sm whitespace-nowrap mb-0.5">Rate: ${o.rate_pn} ml/hr</div>
          <div class="text-[10px] font-bold text-right">หมดอายุ: ${formatThaiDate(expDate)}<br>เวลา 18.00 น.</div>
        </div>
      </div>
    </div>`;
  }

function createFat(o, fNum, div) {
    const exp = new Date(o.order_date); exp.setDate(exp.getDate() + 1);
    const totalNetFat = parseFloat(o.total_fat_prep) || 0; // ยอดรวมทั้งหมด (Lipid + Vit + Flush)
    const vVitTotal   = parseFloat(o.vitalipid_vol)  || 0;
    const vFluTotal   = parseFloat(o.fat_flush_vol)  || 0;
    const vSmofOnlyTotal = totalNetFat - vVitTotal - vFluTotal; // เฉพาะเนื้อ Lipid ทั้งหมด

    let vSmof, vVit, vFlu, vTotalSyr;

    // --- Logic การแบ่งขวดแบบพิเศษ ---
    if (div > 1 && totalNetFat > 250) {
        if (fNum === 1) {
            // ขวดที่ 1: รับส่วนที่เหลือจากขวดอื่นๆ + วิตามิน + ไล่สาย
            vSmof = vSmofOnlyTotal - (250 * (div - 1));
            vVit  = vVitTotal;
            vFlu  = vFluTotal;
            vTotalSyr = vSmof + vVit + vFlu;
        } else {
            // ขวดที่ 2, 3, 4: เป็น Lipid เปล่าๆ 250 ml
            vSmof = 250;
            vVit  = 0;
            vFlu  = 0;
            vTotalSyr = 250;
        }
    } else {
        // กรณีสั่งแค่ 1 ขวด หรือยอดรวมไม่ถึง 250: ให้หารเฉลี่ยปกติ
        vSmof = vSmofOnlyTotal / div;
        vVit  = vVitTotal / div;
        vFlu  = vFluTotal / div;
        vTotalSyr = totalNetFat / div;
    }
    
    // --- ส่วนการแสดงผล (เหมือนเดิม) ---
    const getFatName = (n) => { 
        const name = (n || "").toString().toLowerCase(); 
        if (name === 'smof') return '20% SMOF lipid'; 
        if (name === 'intralipid') return '20% Intralipid'; 
        return n || 'Fat Emulsion'; 
    };
    const fixN = (v) => { 
        const n = parseFloat(v) || 0; 
        return n <= 0 ? "-" : Number(n.toFixed(2)); 
    };
    const vitNameDisplay = vVit > 0 ? (o.vitalipid_type.toLowerCase().includes('infant') ? '✿ Vitalipid N-Infant ✿' : 'Vitalipid N-Adult') : 'Vitalipid';

    return `<div class="sticker-small" contenteditable="true">
      <div style="margin-top: 12mm;">
        <div style="font-size:13.5px; font-weight:800; mb-1;">HN: ${o.hn} – ${o.patient_name}</div>
        <div style="display:table; width:100%; mb-2;">
            <div style="display:table-cell; font-size:18px; font-weight:900;">Ward: ${o.ward}</div>
            <div style="display:table-cell; font-size:18px; font-weight:900; text-align:right;">${fNum}/${div}</div>
        </div>
        <div style="border-bottom:3px solid #000; mb-4;"></div>
        <table style="width:100%; border-collapse:collapse; border:2.5px solid #000; font-size:14.5px; table-layout:fixed; mb-4; background: white;">
          <colgroup><col style="width:72%;"><col style="width:28%;"></colgroup>
          <tbody>
            <tr>
                <td style="border:2px solid #000; padding:4px 6px; font-weight:800; line-height:1.2;">
                    ${getFatName(o.fat_product)} ${fixN(vSmof)} ml
                    ${vFlu > 0 ? `<br>+ ไล่สาย ${fixN(vFlu)} ml` : ''}
                </td>
                <td style="border:2px solid #000; padding:4px 6px; font-weight:900; font-size:18px; text-align:right;">${fixN(vSmof + vFlu)}</td>
            </tr>
            <tr>
                <td style="border:2px solid #000; padding:4px 6px; font-weight:800;">${vitNameDisplay} (ml)</td>
                <td style="border:2px solid #000; padding:4px 6px; font-weight:900; font-size:18px; text-align:right;">${fixN(vVit)}</td>
            </tr>
            <tr style="background: white !important;">
                <td style="border:2px solid #000; padding:4px 6px; font-weight:800; font-size:16px;">Total volume (ml)</td>
                <td style="border:2px solid #000; padding:4px 6px; font-weight:900; font-size:22px; text-align:right;">${fixN(vTotalSyr)}</td>
            </tr>
          </tbody>
        </table>
        <div style="display:table; width:100%; mt-2;">
          <div style="display:table-cell; text-align:left;">
            <div style="font-size:15px; font-weight:900;">Rate: ${o.fat_drip_rate} ml/hr</div>
          </div>
          <div style="display:table-cell; text-align:right;">
            <div style="font-size:11px; font-weight:900;">หมดอายุ: ${formatThaiDate(exp)} 18.00 น.</div>
          </div>
        </div>
      </div></div>`;
}
  function createBag(o) {
    return `<div class="sticker sticker-small" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;" contenteditable="true">
      <div style="margin-top: 6.5mm;">
        <div style="font-size:47px;font-weight:900;line-height:1;">${o.ward}</div>
        <div style="border-top:3.5px solid #000;border-bottom:3.5px solid #000;width:100%;padding:6px 0;margin:6px 0; background: white !important;">
          <span style="font-size:22.5px;font-weight:900;display:block;">${o.patient_name}</span>
        </div>
        <div style="font-size:19px;font-weight:800;margin-bottom:4px;">HN: ${o.hn}</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:6px;">วันที่เตรียม: ${formatThaiDate(o.order_date)}</div>
        <div style="font-size:15.4px;font-weight:800;">(เก็บในตู้เย็น 2-8° C)</div>
      </div>
    </div>`;
  }

function createWS(o, div) {
    const getRowStyle = (name, prodKey, type) => {
      let cls = "c-black"; let bg = "";
      if (prodKey === 'amiparen') cls = "c-amiparen";
      else if (prodKey === 'aminoplasmal' || name.includes('MAL')) cls = "c-aminoplasmal";
      else if (name.includes('Glycophos')) bg = "bg-purple-highlight"; 
      else if (name.includes('Peditrace')) cls = "c-peditrace";
      else if (name.includes('Cernevit')) cls = "c-cernevit";
      else if (name.toLowerCase().includes('b complx')) cls = "c-bcomplex";
      if (name.includes('Soluvit')) { bg = "bg-yellow-highlight"; cls = "c-black"; }
      else if (type === 'heparin') { bg = "bg-pink-highlight"; cls = "c-black"; }
      return { cls, bg };
    };

    const proteinName = o.protein_product === 'aminoven' ? '10% Aminoven-Infant' : (o.protein_product === 'amiparen' ? '10% Ami-pa-REN' : '15% AminoPlas-MAL');
    const phosName = o.phos_source === 'Glycophos' ? 'Glycophos (P)' : 'K2HPO4 (P)';
    const traceName = o.trace_choice === 'Peditrace' ? 'Peditrace' : 'Addamel-N';
    const vitName = o.vit_choice === 'Soluvit' ? 'Soluvit-N' : 'Cernevit';
    const otherName = o.add_name || 'Additive อื่นๆ';

    const vW_net  = getNum(o.water_vol, div);
    const vW_prep = getNum(o.prep_water_vol, div);
    const vD_net  = getNum(o.dex_50_vol, div);
    const vD_prep = getNum(o.prep_dex_vol, div);
    
    const vProt = getNum(o.protein_vol, div); const vPhos = getNum(o.phos_vol, div);
    const vNa = getNum(o.na_vol, div); const vK = getNum(o.k_vol, div);
    const vMg = getNum(o.mg_vol, div); const vTr = getNum(o.trace_vol, div);
    const vCa = getNum(o.ca_vol, div); const vZn = getNum(o.zinc_vol, div);
    const vVit = getNum(o.vit_vol, div); const vOth = getNum(o.add_vol, div);
    const vHep = getNum(o.heparin_vol, div);

    // แก้ไขปัญหาทศนิยมคลาดเคลื่อน: ใช้เลขดิบบวกกันแล้วปัดเศษเฉพาะตอนจะแสดงผล
    let cum = 0; 
    const add = (n) => { 
      cum = Math.round((cum + n) * 100) / 100; 
      return cum; 
    };

    const cumAfter2 = wsShow(add(vW_prep + vD_prep)); 
    const cumAfter3 = wsShow(add(vProt));
    add(vPhos); 
    const cumAfter5 = wsShow(add(vNa));
    
    // คำนวณสะสมต่อจนจบเพื่อความถูกต้องของยอดรวม
    add(vK); add(vMg); add(vTr); add(vCa); add(vZn); add(vVit); add(vOth); add(vHep);

    const row = (num, name, prodKey, type, val, cumVal = '') => {
      const style = getRowStyle(name, prodKey, type);
      return `<tr class="${style.bg}">
        <td class="text-center font-bold ${style.cls}">${num}</td>
        <td class="item-name ${style.cls}">${name}</td>
        <td class="val-prep text-${num < 6 ? 'left' : 'right'} ${style.cls}">${wsShow(val)}</td>
        <td class="val-cumul ${style.cls}">${cumVal}</td>
      </tr>`;
    };

    return `<div class="sheet" contenteditable="true">
      <div class="flex justify-between items-start mb-1" style="margin-top:auto;">
        <div class="flex-1">
          ${div > 1 ? `<div class="bag-badge">PREP x ${div} BAGS</div>` : ''}
          <h1 class="text-xl font-black italic">TPN WORKSHEET</h1>
          <p class="text-[22px] font-black">${o.patient_name}</p>
          <p class="text-sm font-bold">HN: ${o.hn} | BW: ${o.bw} kg | ${formatThaiDate(o.order_date)}</p>
        </div>
        <div class="text-right">
          <p class="text-[9px] font-bold">WARD</p>
          <p class="text-6xl font-black leading-none">${o.ward || '-'}</p>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:45px;">#</th>
            <th>รายการสารอาหาร</th>
            <th style="width:110px;">Prep (ml)</th>
            <th style="width:115px;">ถุงรวม (ml)</th>
          </tr>
        </thead>
        <tbody>
          ${row(1, `Sterile Water <span class="text-[14px] font-normal">(${wsShow(vW_net)} ml)</span>`, '', '', vW_prep)}
          ${row(2, `50% D-W <span class="text-[14px] font-normal">(${wsShow(vD_net)} ml)</span>`, '', '', vD_prep, cumAfter2)}
          ${row(3, proteinName, o.protein_product, '', vProt, cumAfter3)}
          ${row(4, phosName, '', '', vPhos)}
          ${row(5, (o.na_source === 'NaCl' ? '3% NaCl (Na)' : 'Na Acetate (Na)'), '', '', vNa, cumAfter5)}
          ${row(6, (o.k_source === 'KCl' ? '15% KCl (K)' : 'K Acetate (K)'), '', '', vK)}
          ${row(7, '50% MgSO4 (Mg)', '', '', vMg)}
          ${row(8, traceName, '', '', vTr)}
          ${row(9, '10% Ca Gluconate', '', '', vCa)}
          ${row(10, 'Zinc Sulfate', '', '', vZn)}
          ${row(11, vitName, '', '', vVit)}
          ${row(12, otherName, '', '', vOth)}
          ${row(13, 'Heparin (1u/ml) 500u/ml', '', 'heparin', vHep)}
          <tr style="background-color:#ddd;font-weight:900;">
            <td colspan="2" class="text-right text-lg">Total PN vol + ไล่สาย ${wsShow(getNum(o.pn_flush_vol, div))} ml</td>
            <td colspan="2" class="text-center text-4xl">${wsShow(getNum(o.pn_prep_vol, div))}</td>
          </tr>
        </tbody>
      </table>
      <div class="footer-sign">
        <div class="text-center"><div class="w-32 border-b-2 border-black"></div><p class="font-black text-xs mt-2">คนเตรียม</p></div>
        <div class="text-center"><div class="w-32 border-b-2 border-black"></div><p class="font-black text-xs mt-2">คนตรวจ</p></div>
      </div>
    </div>`;
}
</script>
</body>
</html>
